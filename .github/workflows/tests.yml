# Repository variables (Settings → Secrets and variables → Actions → Variables):
# RUNNER — set to "self-hosted" to route jobs to local Mac runners; unset defaults to macos-26.
# CI_RUN_UNIT_TESTS, CI_RUN_UI_TESTS — set to "false" to skip; unset or any other value runs the job.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPMENT_TEAM: ""
  XCODE_PROJECT: Go Cycling.xcodeproj
  XCODE_SCHEME: Go Cycling

jobs:
  unit-tests:
    if: github.repository == 'hubertgajewski/gocycling' && vars.CI_RUN_UNIT_TESTS != 'false'
    name: Unit tests (iPhone)
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'macos-26' || vars.RUNNER || 'macos-26' }}
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap TelemetryDeck config
        run: cp -n TelemetryDeck.xcconfig.example TelemetryDeck.xcconfig || true

      - name: Select Xcode
        if: env.ACT != 'true' && runner.environment == 'github-hosted'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve iPhone simulator destination
        id: destination
        run: |
          chmod +x .github/scripts/ios-simulator-destination.sh
          echo "value=$(.github/scripts/ios-simulator-destination.sh iPhone 'iPhone 17')" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          mkdir -p TestResults
          rm -rf TestResults/unit.xcresult
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination "${{ steps.destination.outputs.value }}" \
            -only-testing:"Go CyclingTests" \
            -resultBundlePath TestResults/unit.xcresult \
            DEVELOPMENT_TEAM= \
            test
        env:
          NSUnbufferedIO: "YES"

      - name: Upload unit test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: TestResults/unit.xcresult
          if-no-files-found: ignore

  ui-tests:
    if: github.repository == 'hubertgajewski/gocycling' && vars.CI_RUN_UI_TESTS != 'false'
    name: UI smoke (${{ matrix.label }})
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'macos-26' || vars.RUNNER || 'macos-26' }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: iphone-se
            label: iPhone SE
            family: iPhone
            device: "iPhone SE (3rd generation)"
          - id: iphone
            label: iPhone
            family: iPhone
            device: "iPhone 17"
          - id: iphone-max
            label: iPhone Max
            family: iPhone
            device: "iPhone 17 Pro Max"
          - id: ipad-mini
            label: iPad mini
            family: iPad
            device: "iPad mini (A17 Pro)"
          - id: ipad-11
            label: iPad 11-inch
            family: iPad
            device: "iPad Pro 11-inch (M5)"
          - id: ipad-13
            label: iPad 13-inch
            family: iPad
            device: "iPad Pro 13-inch (M5)"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap TelemetryDeck config
        run: cp -n TelemetryDeck.xcconfig.example TelemetryDeck.xcconfig || true

      - name: Select Xcode
        if: env.ACT != 'true' && runner.environment == 'github-hosted'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve simulator destination
        id: destination
        run: |
          chmod +x .github/scripts/ios-simulator-destination.sh
          echo "value=$(.github/scripts/ios-simulator-destination.sh '${{ matrix.family }}' '${{ matrix.device }}')" >> "$GITHUB_OUTPUT"

      - name: Run UI tests
        run: |
          mkdir -p TestResults
          rm -rf TestResults/ui-${{ matrix.id }}.xcresult
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination "${{ steps.destination.outputs.value }}" \
            -only-testing:"Go CyclingUITests" \
            -resultBundlePath TestResults/ui-${{ matrix.id }}.xcresult \
            DEVELOPMENT_TEAM= \
            test
        env:
          NSUnbufferedIO: "YES"

      - name: Upload UI test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-results-${{ matrix.id }}
          path: TestResults/ui-${{ matrix.id }}.xcresult
          if-no-files-found: ignore
