# Repository variables (Settings → Secrets and variables → Actions → Variables):
# RUNNER — set to "self-hosted" to route jobs to local Mac runners; unset defaults to macos-26.
# CI_RUN_UNIT_TESTS, CI_RUN_UI_TESTS — set to "false" to skip; unset or any other value runs the job.
# CI_RUN_UI_REGRESSION — set to "true" to run the UI Regression test plan instead of Smoke.
#
# Job order (fail-fast): swift-format → swift-unit-tests → unit-tests and ui-tests in parallel → coverage.
# ui-tests requires swift-format success; it accepts a skipped swift-unit-tests job only when
# CI_RUN_UNIT_TESTS is "false" so UI-only runs remain possible without starting simulator work
# after a format or SwiftPM failure.
# coverage merges unit-test and ios26-iphone UI test coverage (Smoke by default;
# Regression when CI_RUN_UI_REGRESSION is "true") into one Go Cycling.app report.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_regression:
        description: Run UI Regression test plan instead of Smoke
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPMENT_TEAM: ""
  XCODE_PROJECT: Go Cycling.xcodeproj
  XCODE_SCHEME: Go Cycling
  XCODE_UI_SMOKE_SCHEME: Go Cycling UI Smoke
  XCODE_UI_REGRESSION_SCHEME: Go Cycling UI Regression

jobs:
  swift-format:
    name: Swift format (test targets)
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'macos-26' || vars.RUNNER || 'macos-26' }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        if: env.ACT != 'true' && runner.environment == 'github-hosted'
        run: |
          if [[ "$(sw_vers -productVersion)" == 14.* ]]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi

      - name: Lint test target Swift formatting
        run: xcrun swift-format lint --recursive --strict "Go CyclingTests" "Go CyclingUITests"

  swift-unit-tests:
    needs: swift-format
    if: github.repository == 'hubertgajewski/gocycling' && vars.CI_RUN_UNIT_TESTS != 'false'
    name: SwiftPM unit tests (complements Xcode)
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'macos-26' || vars.RUNNER || 'macos-26' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Select Xcode
        if: env.ACT != 'true' && runner.environment == 'github-hosted'
        run: |
          if [[ "$(sw_vers -productVersion)" == 14.* ]]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi

      - name: Show Swift toolchain
        run: swift --version

      - name: Run SwiftPM unit tests
        run: swift test

  unit-tests:
    needs: swift-unit-tests
    if: github.repository == 'hubertgajewski/gocycling' && vars.CI_RUN_UNIT_TESTS != 'false'
    name: Unit tests (iPhone 17)
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && 'macos-26' || vars.RUNNER || 'macos-26' }}
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap TelemetryDeck config
        run: cp -n TelemetryDeck.xcconfig.example TelemetryDeck.xcconfig || true

      - name: Select Xcode
        if: env.ACT != 'true' && runner.environment == 'github-hosted'
        run: |
          if [[ "$(sw_vers -productVersion)" == 14.* ]]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve iPhone simulator destination
        id: destination
        run: |
          chmod +x .github/scripts/ios-simulator-destination.sh
          echo "value=$(.github/scripts/ios-simulator-destination.sh iPhone 'iPhone 17' 'iOS 26')" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          mkdir -p TestResults
          rm -rf TestResults/unit.xcresult
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination "${{ steps.destination.outputs.value }}" \
            -only-testing:"Go CyclingTests" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/unit.xcresult \
            -retry-tests-on-failure \
            DEVELOPMENT_TEAM= \
            test
        env:
          NSUnbufferedIO: "YES"

      - name: Upload unit test coverage result
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-coverage-result
          path: TestResults/unit.xcresult
          if-no-files-found: error

      - name: Upload unit test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: TestResults/unit.xcresult
          if-no-files-found: ignore

  ui-tests:
    needs: [swift-format, swift-unit-tests]
    if: >-
      always() &&
      needs.swift-format.result == 'success' &&
      (needs.swift-unit-tests.result == 'success' ||
        (needs.swift-unit-tests.result == 'skipped' && vars.CI_RUN_UNIT_TESTS == 'false')) &&
      github.repository == 'hubertgajewski/gocycling' &&
      vars.CI_RUN_UI_TESTS != 'false'
    name: UI ${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.run_regression == 'true') || vars.CI_RUN_UI_REGRESSION == 'true') && 'regression' || 'smoke' }} (${{ matrix.runtime }} / ${{ matrix.device_label }})
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && matrix.os || vars.RUNNER || matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        # GitHub-hosted runners do not provide iOS/iPadOS 14-16 simulators here;
        # this matrix covers representative hosted runtimes from the current runner lines.
        include:
          - id: ios17-iphone-se
            os: macos-14
            runtime: iOS 17
            device_label: iPhone SE 3rd gen
            family: iPhone
            device: "iPhone SE (3rd generation)"
          - id: ios17-ipad-mini
            os: macos-14
            runtime: iOS 17
            device_label: iPad mini 6th gen
            family: iPad
            device: "iPad mini (6th generation)"
          - id: ios18-iphone
            os: macos-15
            runtime: iOS 18
            device_label: iPhone 16
            family: iPhone
            device: "iPhone 16"
          - id: ios18-ipad
            os: macos-15
            runtime: iOS 18
            device_label: iPad 10th gen
            family: iPad
            device: "iPad (10th generation)"
          - id: ios26-iphone
            os: macos-26
            runtime: iOS 26
            device_label: iPhone 17
            family: iPhone
            device: "iPhone 17"
          - id: ios26-ipad
            os: macos-26
            runtime: iOS 26
            device_label: iPad Pro 11 M5
            family: iPad
            device: "iPad Pro 11-inch (M5)"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap TelemetryDeck config
        run: cp -n TelemetryDeck.xcconfig.example TelemetryDeck.xcconfig || true

      - name: Select Xcode
        if: env.ACT != 'true' && runner.environment == 'github-hosted'
        run: |
          if [[ "$(sw_vers -productVersion)" == 14.* ]]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi

      - name: Resolve simulator destination
        id: destination
        run: |
          chmod +x .github/scripts/ios-simulator-destination.sh
          echo "value=$(.github/scripts/ios-simulator-destination.sh '${{ matrix.family }}' '${{ matrix.device }}' '${{ matrix.runtime }}')" >> "$GITHUB_OUTPUT"

      - name: Grant simulator location for UI tests
        env:
          UI_TEST_FAMILY: ${{ matrix.family }}
          UI_TEST_DEVICE: ${{ matrix.device }}
          UI_TEST_RUNTIME: ${{ matrix.runtime }}
        run: |
          chmod +x .github/scripts/ui-test-simctl-location.sh .github/scripts/ui-test-simulator-udid.sh
          udid="$(UI_TEST_PREFERRED_DEVICE="$UI_TEST_DEVICE" .github/scripts/ui-test-simulator-udid.sh "$UI_TEST_FAMILY" "$UI_TEST_DEVICE" "$UI_TEST_RUNTIME")"
          UI_TEST_DEVICE_FAMILY="$UI_TEST_FAMILY" UI_TEST_PREFERRED_DEVICE="$UI_TEST_DEVICE" \
            SRCROOT="$GITHUB_WORKSPACE" \
            .github/scripts/ui-test-simctl-location.sh grant "$udid"

      - name: Run UI tests
        env:
          UI_TEST_FAMILY: ${{ matrix.family }}
          UI_TEST_DEVICE: ${{ matrix.device }}
          UI_TEST_RUNTIME: ${{ matrix.runtime }}
          NSUnbufferedIO: "YES"
        run: |
          mkdir -p TestResults
          rm -rf TestResults/ui-${{ matrix.id }}.xcresult
          chmod +x .github/scripts/ui-test-simctl-location.sh .github/scripts/ui-test-simulator-udid.sh
          # Re-grant after build/install so TCC matches the app under test; the earlier
          # step boots the simulator before xcodebuild installs the .app.
          udid="$(UI_TEST_PREFERRED_DEVICE="$UI_TEST_DEVICE" .github/scripts/ui-test-simulator-udid.sh "$UI_TEST_FAMILY" "$UI_TEST_DEVICE" "$UI_TEST_RUNTIME")"
          UI_TEST_DEVICE_FAMILY="$UI_TEST_FAMILY" UI_TEST_PREFERRED_DEVICE="$UI_TEST_DEVICE" \
            SRCROOT="$GITHUB_WORKSPACE" \
            .github/scripts/ui-test-simctl-location.sh grant "$udid"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.run_regression }}" == "true" ]] \
            || [[ "${{ vars.CI_RUN_UI_REGRESSION }}" == "true" ]]; then
            ui_scheme="$XCODE_UI_REGRESSION_SCHEME"
          else
            ui_scheme="$XCODE_UI_SMOKE_SCHEME"
          fi
          coverage_flag=()
          if [[ "${{ matrix.id }}" == "ios26-iphone" ]]; then
            coverage_flag=(-enableCodeCoverage YES)
          fi
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$ui_scheme" \
            -configuration Debug \
            -destination "${{ steps.destination.outputs.value }}" \
            "${coverage_flag[@]}" \
            -resultBundlePath TestResults/ui-${{ matrix.id }}.xcresult \
            -retry-tests-on-failure \
            DEVELOPMENT_TEAM= \
            test

      - name: Upload UI test coverage result
        if: matrix.id == 'ios26-iphone'
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-coverage-ios26-iphone
          path: TestResults/ui-ios26-iphone.xcresult
          if-no-files-found: error

      - name: Upload UI test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-results-${{ matrix.id }}
          path: TestResults/ui-${{ matrix.id }}.xcresult
          if-no-files-found: ignore

  coverage:
    needs: [unit-tests, ui-tests]
    if: >-
      always() &&
      needs.unit-tests.result == 'success' &&
      needs.ui-tests.result == 'success' &&
      github.repository == 'hubertgajewski/gocycling' &&
      vars.CI_RUN_UNIT_TESTS != 'false' &&
      vars.CI_RUN_UI_TESTS != 'false'
    name: Combined code coverage
    runs-on: ${{ vars.RUNNER || 'macos-26' }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download unit test coverage result
        uses: actions/download-artifact@v7
        with:
          name: unit-test-coverage-result
          path: artifacts/unit-coverage

      - name: Download UI test coverage result
        uses: actions/download-artifact@v7
        with:
          name: ui-test-coverage-ios26-iphone
          path: artifacts/ui-coverage

      - name: Merge unit and UI code coverage
        run: |
          chmod +x .github/scripts/restore-xcresult-bundle.sh
          chmod +x .github/scripts/merge-combined-coverage.sh
          mkdir -p TestResults
          .github/scripts/restore-xcresult-bundle.sh \
            artifacts/unit-coverage \
            TestResults/unit.xcresult
          .github/scripts/restore-xcresult-bundle.sh \
            artifacts/ui-coverage \
            TestResults/ui-ios26-iphone.xcresult
          .github/scripts/merge-combined-coverage.sh \
            TestResults/unit.xcresult \
            TestResults/ui-ios26-iphone.xcresult \
            TestResults

      - name: Publish combined code coverage summary
        run: python3 .github/scripts/write-xccov-summary.py TestResults/coverage.json --target "Go Cycling.app" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined code coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: combined-test-coverage
          path: |
            TestResults/coverage.json
            TestResults/combined.xccovreport
            TestResults/combined.xccovarchive
          if-no-files-found: error
